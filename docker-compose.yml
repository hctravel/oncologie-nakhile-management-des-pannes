version: '3.9'

# =============================================================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# =============================================================================
# Run: docker compose up
# Logs: docker compose logs -f [service-name]
# Rebuild: docker compose up --build
# Clean: docker compose down -v
# =============================================================================

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: medical-machine-mysql-dev
    restart: on-failure
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql_password_123
      MYSQL_DATABASE: medical_machine_app
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password_123
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - mysql_config_dev:/etc/mysql/conf.d
    networks:
      - medical-machine-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql_password_123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=

  # Backend API Server - Hot reload with Nodemon
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-machine-backend-dev
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mysql_password_123
      DB_NAME: medical_machine_app
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_min_32_char_required
      REFRESH_TOKEN_SECRET: your_super_secret_refresh_token_key_change_in_production_min_32_chars
      PORT: 5000
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Source code - auto-reload with nodemon
      - ./backend/src:/app/src
      # Exclude node_modules from being overwritten
      - /app/node_modules
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
    networks:
      - medical-machine-network-dev
    command: npm run dev
    stdin_open: true
    tty: true

  # Frontend React App - Hot module reloading
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        REACT_APP_API_URL: http://backend:5000/api
    container_name: medical-machine-frontend-dev
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "1000"
      REACT_APP_API_URL: http://localhost:5000/api
      # Disable eslint warnings during development
      SKIP_PREFLIGHT_CHECK: "true"
    depends_on:
      - backend
    volumes:
      # Mount entire app directory for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Exclude node_modules from being overwritten
      - /app/node_modules
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
    networks:
      - medical-machine-network-dev
    command: npm start
    stdin_open: true
    tty: true

volumes:
  mysql_data_dev:
    driver: local
  mysql_config_dev:
    driver: local

networks:
  medical-machine-network-dev:
    driver: bridge
