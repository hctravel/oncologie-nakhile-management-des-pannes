version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: medical-machine-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql_password_123
      MYSQL_DATABASE: medical_machine_app
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password_123
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_config:/etc/mysql/conf.d
    networks:
      - medical-machine-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql_password_123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: --default-authentication-plugin=mysql_native_password

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-machine-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mysql_password_123
      DB_NAME: medical_machine_app
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_min_32_char_required
      REFRESH_TOKEN_SECRET: your_super_secret_refresh_token_key_change_in_production_min_32_chars
      PORT: 5000
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - medical-machine-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:5000/api
    container_name: medical-machine-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - medical-machine-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local
  mysql_config:
    driver: local

networks:
  medical-machine-network:
    driver: bridge
